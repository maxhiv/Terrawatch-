import { create } from "zustand";
import { persist, createJSONStorage } from "zustand/middleware";
import { api } from "../lib/api";

export const useAuthStore = create()(
  persist(
    (set, get) => ({
      accessToken: null, refreshToken: null, user: null, isAuthenticated: false,
      login: async (email, password) => {
        const data = await api.post("/auth/login", { email, password });
        set({ accessToken: data.accessToken, refreshToken: data.refreshToken, user: data.user, isAuthenticated: true });
      },
      logout: async () => {
        const { refreshToken } = get();
        try { await api.post("/auth/logout", { refreshToken }); } catch {}
        set({ accessToken: null, refreshToken: null, user: null, isAuthenticated: false });
      },
      refresh: async () => {
        const { refreshToken } = get();
        if (!refreshToken) throw new Error("No refresh token");
        const data = await api.post("/auth/refresh", { refreshToken });
        set({ accessToken: data.accessToken });
      },
    }),
    {
      name: "terrawatch-auth",
      storage: createJSONStorage(() => localStorage),
      partialize: (s) => ({ accessToken: s.accessToken, refreshToken: s.refreshToken, user: s.user, isAuthenticated: s.isAuthenticated }),
    }
  )
);
